<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Code Duplication Detection Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        textarea {
            width: 45%;
            height: 220px;
            font-family: monospace;
            font-size: 13px;
            padding: 10px;
        }

        .container {
            display: flex;
            justify-content: space-between;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .dup {
            color: green;
        }

        .non-dup {
            color: red;
        }
    </style>
</head>
<body>

<h2>Code Duplication Detection</h2>
<p>Paste two code snippets and check whether they are duplicated.</p>

<div class="container">
    <textarea id="code1" placeholder="Enter first code here..."></textarea>
    <textarea id="code2" placeholder="Enter second code here..."></textarea>
</div>

<button onclick="checkDuplication()">Check Duplication</button>

<div id="result"></div>

<script>
async function checkDuplication() {
    const code1 = document.getElementById("code1").value;
    const code2 = document.getElementById("code2").value;

    if (!code1 || !code2) {
        alert("Please enter both code snippets.");
        return;
    }

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            code1: code1,
            code2: code2
        })
    });

    const data = await response.json();
    const resultDiv = document.getElementById("result");

    if (data.prediction === "Duplicated") {
        resultDiv.innerHTML = "<span class='dup'>Duplicated</span>";
    } else {
        resultDiv.innerHTML = "<span class='non-dup'>Not Duplicated</span>";
    }
}
</script>

</body>
</html>
